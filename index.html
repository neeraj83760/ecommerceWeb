<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f1f5f9}

header{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;background:#1e3a8a;color:#fff;padding:12px}
.nav a{margin-left:10px;color:#fff;cursor:pointer}
.search{width:100%;margin-top:10px}
.search input{width:100%;padding:8px;border-radius:6px;border:none}

.hero{background:linear-gradient(90deg,#1e3a8a,#2563eb);color:#fff;padding:30px;border-radius:10px;margin:15px;text-align:center}
.hero h1{font-size:24px}
.hero p{margin-top:10px}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:10px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card img{width:100%;height:140px;object-fit:cover;border-radius:8px}
button{background:#1e3a8a;color:#fff;border:none;padding:8px;margin-top:5px;border-radius:5px;width:100%}

.page{display:none}
.active{display:block}

.cart{position:fixed;bottom:10px;right:10px;background:#1e3a8a;color:#fff;padding:10px;border-radius:20px;cursor:pointer}
.cart-panel{position:fixed;right:-100%;top:0;width:280px;height:100%;background:#fff;padding:15px;transition:.3s;overflow:auto}
.cart-panel.active{right:0}

@media(max-width:600px){
 header{flex-direction:column;align-items:flex-start}
}
</style>
</head>

<body>
<header>
<div>⚡ Neeraj Electronics</div>
<div class="nav">
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('shop')">Shop</a>
<a onclick="showPage('contact')">Contact</a>
</div>
<div class="search"><input placeholder="Search products..." onkeyup="searchProducts(this.value)"></div>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>Welcome to Neeraj Electronics ⚡</h1>
<p>Explore top gadgets, best prices & latest tech</p>
</div>

<h2 style="padding:10px">🔥 Featured Products</h2>
<div class="products" id="featured"></div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
<div class="products" id="products"></div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
<h2>Contact Us</h2>
<p>Email: support@neeraj.com</p>
<p>Phone: +91 9876543210</p>
</div>

<div class="cart" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="cart-panel" id="cartPanel">
<h3>Cart</h3>
<div id="cartItems"></div>
<h4>Total ₹<span id="total">0</span></h4>
</div>

<script>
const products=[
{id:1,name:"Laptop",price:50000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{id:2,name:"Smartphone",price:20000,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{id:3,name:"Headphones",price:3000,img:"https://images.unsplash.com/photo-1518441902110-2c2e4c7a0c3b"},
{id:4,name:"Smartwatch",price:7000,img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"},
{id:5,name:"Camera",price:40000,img:"https://images.unsplash.com/photo-1512499617640-c2f999098c01"},
{id:6,name:"Bluetooth Speaker",price:2500,img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad"},
{id:7,name:"Tablet",price:30000,img:"https://images.unsplash.com/photo-1542751371-adc38448a05e"},
{id:8,name:"Gaming Mouse",price:1500,img:"https://images.unsplash.com/photo-1587202372775-9895b7bfa52d"},
{id:9,name:"Keyboard",price:2000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{id:10,name:"Monitor",price:12000,img:"https://images.unsplash.com/photo-1587829741301-dc798b83add3"},
{id:11,name:"Power Bank",price:1800,img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"},
{id:12,name:"Router",price:2200,img:"https://images.unsplash.com/photo-1555617117-08c6a2c7fefb"},
{id:13,name:"Drone",price:45000,img:"https://images.unsplash.com/photo-1508615070457-7baeba4003ab"},
{id:14,name:"VR Headset",price:25000,img:"https://images.unsplash.com/photo-1593508512255-86ab42a8e620"},
{id:15,name:"Microphone",price:5000,img:"https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4"},
{id:16,name:"LED TV",price:60000,img:"https://images.unsplash.com/photo-1593784991095-a205069470b6"}
];

let cart=[];

function render(list=products){
 document.getElementById('products').innerHTML=list.map(p=>`
 <div class="card">
 <img src="${p.img}">
 <h3>${p.name}</h3>
 <p>₹${p.price}</p>
 <button onclick="addToCart(${p.id})">Add to Cart</button>
 </div>`).join('');
}

function renderFeatured(){
 const items=products.slice(0,4);
 document.getElementById('featured').innerHTML=items.map(p=>`
 <div class="card">
 <img src="${p.img}">
 <h3>${p.name}</h3>
 <p>₹${p.price}</p>
 </div>`).join('');
}

function addToCart(id){
 const p=products.find(x=>x.id===id);
 cart.push(p);
 updateCart();
 fbq('track','AddToCart',{content_name:p.name,value:p.price,currency:'INR'});
}

function updateCart(){
 let total=0;
 document.getElementById('cartItems').innerHTML=cart.map((item,index)=>{
 total+=item.price;
 return `<div>${item.name} ₹${item.price} <button onclick="removeItem(${index})">❌</button></div>`;
 }).join('');
 document.getElementById('count').innerText=cart.length;
 document.getElementById('total').innerText=total;
}

function removeItem(index){
 cart.splice(index,1);
 updateCart();
}

function toggleCart(){
 document.getElementById('cartPanel').classList.toggle('active');
}

function showPage(page){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(page).classList.add('active');
 if(page==='shop'){render();}
 if(page==='contact'){fbq('track','Contact');}
}

function searchProducts(q){
 const filtered=products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
 render(filtered);
}

render();
renderFeatured();
</script>

</body>
</html>
