<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neeraj Electronics</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f1f5f9}

header{display:flex;align-items:center;justify-content:space-between;background:#1e3a8a;color:#fff;padding:12px 20px;flex-wrap:wrap}
.logo{font-size:20px;font-weight:600}
.logo span{color:#facc15}
.search{flex:1;margin:10px}
.search input{width:100%;padding:10px;border-radius:8px;border:none}
.nav a{margin-left:15px;color:#fff;text-decoration:none;cursor:pointer}

.page{display:none;padding:20px}
.active-page{display:block}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px}
.card{background:#fff;border-radius:10px;padding:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
.card img{width:100%;height:140px;object-fit:cover;border-radius:8px}
.price{color:#1e40af;font-weight:600}
button{width:100%;padding:8px;border:none;border-radius:6px;margin-top:5px;background:#1e3a8a;color:#fff}

.cart-btn{position:fixed;bottom:15px;right:15px;background:#1e3a8a;color:#fff;padding:10px 15px;border-radius:25px}
.cart-panel{position:fixed;right:-100%;top:0;width:300px;height:100%;background:#fff;padding:15px;transition:.3s;overflow:auto}
.cart-panel.active{right:0}

.payment-page{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center}
.payment-box{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:300px}

</style>
</head>

<body>
<header>
  <div class="logo">⚡ Neeraj <span>Electronics</span></div>
  <div class="search"><input placeholder="Search products..." onkeyup="searchProducts(this.value)"></div>
  <div class="nav">
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('shop')">Shop</a>
    <a onclick="showPage('contact')">Contact</a>
  </div>
</header>

<!-- HOME -->
<div id="home" class="page active-page">
  <h2>Welcome to Neeraj Electronics ⚡</h2>
  <p>Best deals on laptops, mobiles & accessories.</p>
</div>

<!-- SHOP -->
<div id="shop" class="page">
  <h2>Shop Products</h2>
  <div class="products" id="productList"></div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <h2>Contact Us</h2>
  <p>Name: Neeraj Electronics</p>
  <p>Email: support@neeraj.com</p>
  <p>Phone: +91 9876543210</p>
</div>

<div class="cart-btn" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>

<div class="cart-panel" id="cartPanel">
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <h4>Total ₹<span id="total">0</span></h4>
  <button onclick="checkout()">Checkout</button>
</div>

<div class="payment-page" id="paymentPage">
  <div class="payment-box">
    <h3>Checkout</h3>
    <div id="checkoutItems"></div>
    <button onclick="payNow()">Pay Now</button>
  </div>
</div>

<script>
const products=[
 {id:1,name:"Laptop",price:50000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
 {id:2,name:"Phone",price:20000,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
 {id:3,name:"Headphones",price:5000,img:"https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5"},
 {id:4,name:"Camera",price:40000,img:"https://images.unsplash.com/photo-1512499617640-c2f999098c01"},
  {
      id: 5,
      name: "Smartphone",
      price: 25000,
      img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
    },
  {
      id: 6,
      name: "Smartwatch",
      price: 8000,
      img: "https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"
    }
  
];

let cart=[];

function render(){
 document.getElementById('productList').innerHTML=products.map(p=>`
  <div class="card">
    <img src="${p.img}">
    <div>${p.name}</div>
    <div class="price">₹${p.price}</div>
    <button onclick="addToCart(${p.id})">Add</button>
  </div>
 `).join('');
}

function addToCart(id){
 const p=products.find(x=>x.id===id);
 cart.push(p);
 updateCart();
}

function updateCart(){
 document.getElementById('count').innerText=cart.length;
 let total=0;
 document.getElementById('cartItems').innerHTML=cart.map((i,index)=>{
  total+=i.price;
  return `<div>${i.name} ₹${i.price} <button onclick="removeItem(${index})">❌</button></div>`;
 }).join('');
 document.getElementById('total').innerText=total;
}

function removeItem(index){
 cart.splice(index,1);
 updateCart();
}

function toggleCart(){document.getElementById('cartPanel').classList.toggle('active')}

function checkout(){
 document.getElementById('paymentPage').style.display='flex';
 document.getElementById('cartPanel').classList.remove('active');
 renderCheckout();
}

function renderCheckout(){
 document.getElementById('checkoutItems').innerHTML=cart.map((i,index)=>`
  <div>${i.name} ₹${i.price} <button onclick="removeItem(${index});renderCheckout()">Remove</button></div>
 `).join('');
}

function payNow(){alert('Payment Successful 🎉');cart=[];updateCart();document.getElementById('paymentPage').style.display='none'}

// function showPage(page){
//  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
//  document.getElementById(page).classList.add('active-page');
// }

  function showPage(page){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
 document.getElementById(page).classList.add('active-page');

 // 🔥 ADD THIS LINE
 if(page === 'shop'){
   render();
 }
}

function searchProducts(q){
 const filtered=products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
 document.getElementById('productList').innerHTML=filtered.map(p=>`
  <div class="card">
    <img src="${p.img}">
    <div>${p.name}</div>
    <div class="price">₹${p.price}</div>
    <button onclick="addToCart(${p.id})">Add</button>
  </div>
 `).join('');
}

// close cart on outside click
window.addEventListener('click',function(e){
 const cartPanel=document.getElementById('cartPanel');
 const btn=document.querySelector('.cart-btn');
 if(!cartPanel.contains(e.target)&&!btn.contains(e.target)){
  cartPanel.classList.remove('active');
 }
});

render();
</script>
</body>
</html>
